<script>
    // API URL - dynamic
    const API_URL = window.location.origin;
    
    // ✅ XAVFSIZ JSON PARSER - bo'sh javoblarni ushlaydi
    async function safeJson(response) {
        const text = await response.text();
        if (!text || text.trim() === '') {
            console.warn('⚠️ Bo\'sh javob:', response.url);
            return {};
        }
        try {
            return JSON.parse(text);
        } catch (e) {
            console.error('❌ JSON xatoligi:', e, 'Javob:', text.substring(0, 200));
            return { error: 'Server javobini o\'qib bo\'lmadi' };
        }
    }

    // State
    let token = localStorage.getItem('token');
    let currentUser = null;

    // DOM Elements
    const authSection = document.getElementById('authSection');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const booksGrid = document.getElementById('booksGrid');
    const onlineCount = document.getElementById('onlineCount');
    const userName = document.getElementById('userName');

    // Init
    document.addEventListener('DOMContentLoaded', () => {
        if (token) checkAuth();
        updateOnlineCount();
        setInterval(updateOnlineCount, 30000);
    });

    // Error/Success messages
    function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.style.cssText = 'background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#f87171;display:block;padding:12px;border-radius:8px;margin-bottom:20px;';
        setTimeout(() => errorMessage.style.display = 'none', 5000);
    }
    function showSuccess(msg) {
        errorMessage.textContent = msg;
        errorMessage.style.cssText = 'background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#4ade80;display:block;padding:12px;border-radius:8px;margin-bottom:20px;';
        setTimeout(() => errorMessage.style.display = 'none', 4000);
    }

    // Login
    loginForm?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username')?.value.trim();
        if (!username || username.length < 3) return showError('Nickname kamida 3 belgi');

        const btn = document.getElementById('loginBtn');
        const original = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Loading...';

        try {
            const res = await fetch(`${API_URL}/api/auth/join`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await safeJson(res);
            
            if (!res.ok || data.error) throw new Error(data.error || 'Login failed');
            
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('token', token);
            showDashboard();
        } catch (err) {
            console.error('Login error:', err);
            showError(err.message || 'Serverga ulanib bo\'lmadi');
        } finally {
            btn.disabled = false;
            btn.textContent = original;
        }
    });

    // Check auth
    async function checkAuth() {
        try {
            const res = await fetch(`${API_URL}/api/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await safeJson(res);
            if (res.ok && data.user) {
                currentUser = data.user;
                showDashboard();
            } else {
                logout();
            }
        } catch { logout(); }
    }

    // Show dashboard
    function showDashboard() {
        if (authSection) authSection.style.display = 'none';
        if (dashboard) dashboard.style.display = 'block';
        if (userName && currentUser) userName.textContent = currentUser.username;
        loadBooks();
    }

    // Load books
    async function loadBooks() {
        try {
            const res = await fetch(`${API_URL}/api/books`);
            const data = await safeJson(res);
            if (data.books?.length) {
                renderBooks(data.books);
            } else {
                renderBooks(getSampleBooks());
            }
        } catch {
            renderBooks(getSampleBooks());
        }
    }

    // Sample books fallback
    function getSampleBooks() {
        return [
            { id: 1, title: 'Vocabulary for IELTS', author: 'Cambridge', level: 'Advanced', description: 'IELTS so\'zlar' },
            { id: 2, title: 'Academic Grammar', author: 'Oxford', level: 'Intermediate', description: 'Grammatika' },
            { id: 3, title: 'Business English', author: 'Pearson', level: 'Intermediate', description: 'Biznes tili' }
        ];
    }

    // Render books
    function renderBooks(books) {
        if (!booksGrid) return;
        booksGrid.innerHTML = books.map(book => `
            <div class="book-card" onclick="selectBook(${book.id})" id="book-${book.id}">
                <span class="book-level">${book.level}</span>
                <h3 class="book-title">${book.title}</h3>
                <p class="book-author">by ${book.author}</p>
                <p class="book-description">${book.description}</p>
                <div class="book-check">✓ Selected</div>
            </div>
        `).join('');
    }

    // Select book
    async function selectBook(bookId) {
        if (!token) return;
        try {
            const res = await fetch(`${API_URL}/api/books/select`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ bookId })
            });
            const data = await safeJson(res);
            if (res.ok && !data.error) {
                document.querySelectorAll('.book-card').forEach(c => c.classList.remove('selected'));
                document.getElementById(`book-${bookId}`)?.classList.add('selected');
                const title = document.querySelector(`#book-${bookId} .book-title`)?.textContent;
                showSuccess(`✅ Tanlandi: ${title}`);
            } else {
                showError(data.error || 'Xatolik');
            }
        } catch (err) {
            console.error('Select error:', err);
            showError('Kitobni tanlashda xatolik');
        }
    }

    // Online count
    async function updateOnlineCount() {
        try {
            const res = await fetch(`${API_URL}/api/presence/online`);
            const data = await safeJson(res);
            if (onlineCount) onlineCount.textContent = data.count || 0;
        } catch {}
    }

    // Logout
    function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('token');
        if (authSection) authSection.style.display = 'flex';
        if (dashboard) dashboard.style.display = 'none';
        const input = document.getElementById('username');
        if (input) input.value = '';
    }
</script>
