<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muminov English Pro - Academic English Learning Hub</title>
    <link rel="manifest" href="manifest.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .online-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Auth Section */
        .auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 200px);
            padding: 40px 20px;
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-title {
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
            color: #f1f5f9;
        }

        .auth-subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            padding: 40px 0;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-title {
            font-size: 36px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-text {
            color: #94a3b8;
            font-size: 18px;
        }

        /* Books Grid */
        .books-section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 24px;
            color: #f1f5f9;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .book-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .book-card:hover {
            transform: translateY(-4px);
            border-color: rgba(96, 165, 250, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .book-card.selected {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }

        .book-level {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .book-title {
            font-size: 20px;
            margin-bottom: 8px;
            color: #f1f5f9;
        }

        .book-author {
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .book-description {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
        }

        .book-check {
            display: none;
            color: #22c55e;
            font-size: 24px;
            margin-top: 16px;
        }

        .book-card.selected .book-check {
            display: block;
        }

        /* Profile Section */
        .profile-section {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 40px;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-name {
            font-size: 20px;
            color: #f1f5f9;
        }

        .btn-logout {
            padding: 8px 20px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(96, 165, 250, 0.3);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-card {
                padding: 24px;
            }

            .welcome-title {
                font-size: 28px;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">📚 Muminov English Pro</div>
                <div class="online-indicator">
                    <div class="pulse"></div>
                    <span id="onlineCount">0</span> learners online
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Auth Section -->
        <section class="auth-section" id="authSection">
            <div class="auth-card">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Enter your nickname to continue learning</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="username">Nickname</label>
                        <input 
                            type="text" 
                            id="username" 
                            class="form-input" 
                            placeholder="Enter your nickname"
                            required
                            minlength="3"
                        >
                    </div>
                    <button type="submit" class="btn" id="loginBtn">
                        Start Learning
                    </button>
                </form>
            </div>
        </section>

        <!-- Dashboard -->
        <section class="dashboard" id="dashboard">
            <!-- Profile -->
            <div class="profile-section">
                <div class="profile-header">
                    <div>
                        <h2 class="profile-name">Welcome, <span id="userName">Student</span>! 👋</h2>
                        <p style="color: #94a3b8; margin-top: 4px;">Choose your learning path</p>
                    </div>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>

            <!-- Books -->
            <div class="books-section">
                <h2 class="section-title">📖 Available Books</h2>
                <div class="books-grid" id="booksGrid">
                    <!-- Books will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <script>
        // API Base URL
        const API_URL = window.location.origin;
        
        // State
        let token = localStorage.getItem('token');
        let currentUser = null;

        // DOM Elements
        const authSection = document.getElementById('authSection');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        const booksGrid = document.getElementById('booksGrid');
        const onlineCount = document.getElementById('onlineCount');
        const userName = document.getElementById('userName');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                checkAuth();
            }
            updateOnlineCount();
            setInterval(updateOnlineCount, 30000); // Update every 30 seconds
        });

        // Show error
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            
            if (!username || username.length < 3) {
                showError('Nickname must be at least 3 characters');
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Loading...';

            try {
                const response = await fetch(`${API_URL}/api/auth/join`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                
                showDashboard();
                sendHeartbeat();
            } catch (error) {
                showError(error.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Start Learning';
            }
        });

        // Check auth
        async function checkAuth() {
            try {
                const response = await fetch(`${API_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    showDashboard();
                    sendHeartbeat();
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                logout();
            }
        }

        // Show dashboard
        async function showDashboard() {
            authSection.style.display = 'none';
            dashboard.style.display = 'block';
            
            if (currentUser) {
                userName.textContent = currentUser.username;
            }

            await loadBooks();
        }

        // Load books
        async function loadBooks() {
            try {
                const response = await fetch(`${API_URL}/api/books`);
                const data = await response.json();

                if (data.books && data.books.length > 0) {
                    renderBooks(data.books);
                } else {
                    // Sample books if API returns empty
                    renderBooks(getSampleBooks());
                }
            } catch (error) {
                console.error('Failed to load books:', error);
                renderBooks(getSampleBooks());
            }
        }

        // Get sample books
        function getSampleBooks() {
            return [
                {
                    id: 1,
                    title: "Vocabulary for IELTS Advanced",
                    author: "Cambridge University",
                    level: "Advanced",
                    description: "Comprehensive vocabulary building for IELTS exam preparation"
                },
                {
                    id: 2,
                    title: "Academic English Grammar",
                    author: "Oxford Press",
                    level: "Intermediate",
                    description: "Essential grammar rules for academic writing and speaking"
                },
                {
                    id: 3,
                    title: "Business English Communication",
                    author: "Pearson Education",
                    level: "Intermediate",
                    description: "Professional English for business environments"
                },
                {
                    id: 4,
                    title: "English Pronunciation Master",
                    author: "BBC Learning",
                    level: "Beginner",
                    description: "Master English pronunciation and intonation"
                }
            ];
        }

        // Render books
        function renderBooks(books) {
            booksGrid.innerHTML = books.map(book => `
                <div class="book-card" onclick="selectBook(${book.id})" id="book-${book.id}">
                    <span class="book-level">${book.level}</span>
                    <h3 class="book-title">${book.title}</h3>
                    <p class="book-author">by ${book.author}</p>
                    <p class="book-description">${book.description}</p>
                    <div class="book-check">✓ Selected</div>
                </div>
            `).join('');
        }

        // Select book
        async function selectBook(bookId) {
            if (!token) return;

            try {
                const response = await fetch(`${API_URL}/api/books/select`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ bookId })
                });

                if (response.ok) {
                    // Update UI
                    document.querySelectorAll('.book-card').forEach(card => {
                        card.classList.remove('selected');
                    });
                    document.getElementById(`book-${bookId}`).classList.add('selected');
                    
                    // Show success message
                    const book = document.querySelector(`#book-${bookId} .book-title`).textContent;
                    showError(`✅ Successfully selected: ${book}`);
                    errorMessage.style.background = 'rgba(34, 197, 94, 0.1)';
                    errorMessage.style.borderColor = 'rgba(34, 197, 94, 0.3)';
                    errorMessage.style.color = '#22c55e';
                }
            } catch (error) {
                console.error('Failed to select book:', error);
                showError('Failed to select book. Please try again.');
            }
        }

        // Update online count
        async function updateOnlineCount() {
            try {
                const response = await fetch(`${API_URL}/api/presence/online`);
                const data = await response.json();
                onlineCount.textContent = data.count || 0;
            } catch (error) {
                console.error('Failed to update online count:', error);
            }
        }

        // Send heartbeat
        async function sendHeartbeat() {
            if (!token) return;

            try {
                await fetch(`${API_URL}/api/presence/heartbeat`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
            } catch (error) {
                console.error('Heartbeat failed:', error);
            }

            // Send heartbeat every 25 seconds
            setTimeout(sendHeartbeat, 25000);
        }

        // Logout
        function logout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            authSection.style.display = 'flex';
            dashboard.style.display = 'none';
            document.getElementById('username').value = '';
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>
</html>
